<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COFFEE MASTERS | Art of Brewing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #2C1810;
            color: #F5F0E5;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Coffee bean pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M30,40 Q40,30 50,40 Q60,50 50,60 Q40,70 30,60 Q20,50 30,40" fill="%23D4A574"/><path d="M70,40 Q80,30 90,40 Q100,50 90,60 Q80,70 70,60 Q60,50 70,40" fill="%23D4A574"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .coffee-cup {
            font-size: 4rem;
            display: inline-block;
            animation: steam 3s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes steam {
            0%, 100% { transform: translateY(0) rotate(0deg); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
            50% { transform: translateY(-8px) rotate(2deg); filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4)); }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            letter-spacing: 6px;
            color: #D4A574;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #B8A99A;
            letter-spacing: 4px;
            font-weight: 300;
            margin-top: 5px;
        }

        /* Navigation Grid */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-card:hover {
            background: rgba(212, 165, 116, 0.1);
            transform: translateY(-5px);
            border-color: #D4A574;
        }

        .nav-card.active {
            background: #D4A574;
            border-color: #D4A574;
            transform: scale(1.05);
        }

        .nav-card.active .nav-name, .nav-card.active .nav-origin {
            color: #2C1810;
        }

        .nav-icon { font-size: 2rem; margin-bottom: 10px; }
        .nav-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; color: #D4A574; }
        .nav-origin { font-size: 0.75rem; color: #B8A99A; }

        /* Content Display */
        .display-area {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            background: rgba(20, 10, 5, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(212, 165, 116, 0.1);
            min-height: 600px;
        }

        .coffee-content { opacity: 0; transform: translateX(-20px); transition: 0.5s ease-out; }
        .coffee-media { opacity: 0; transform: translateX(20px); transition: 0.5s ease-out; }
        
        .active-view .coffee-content, .active-view .coffee-media {
            opacity: 1;
            transform: translateX(0);
        }

        .title-tag { color: #D4A574; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .main-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin-bottom: 15px; color: #F5F0E5; }
        .desc { color: #B8A99A; font-size: 1.05rem; margin-bottom: 30px; max-width: 600px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .stat-box { background: rgba(212, 165, 116, 0.05); padding: 15px 25px; border-radius: 12px; border-left: 3px solid #D4A574; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #B8A99A; }
        .stat-data { font-weight: 600; color: #D4A574; }

        .step-list { list-style: none; }
        .step-item { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        .step-num { 
            background: #D4A574; color: #2C1810; width: 30px; height: 30px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 800; flex-shrink: 0; font-size: 0.9rem;
        }
        .step-text h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: #D4A574; }
        .step-text p { font-size: 0.9rem; color: #B8A99A; }

        .hero-img {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .thumb { 
            height: 80px; border-radius: 10px; cursor: pointer; opacity: 0.6; 
            transition: 0.3s; object-fit: cover; width: 100%;
        }
        .thumb:hover { opacity: 1; transform: scale(1.05); }

        @media (max-width: 900px) {
            .display-area { grid-template-columns: 1fr; }
            .coffee-media { order: -1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="coffee-cup">☕</div>
            <h1>Coffee Masters</h1>
            <p class="subtitle">EXPERIENCE THE BREW</p>
        </header>

        <nav class="nav-grid" id="coffeeNav">
            </nav>

        <main class="display-area" id="mainDisplay">
            </main>
    </div>

    <script>
        const coffeeMenu = {
            espresso: {
                icon: '☕',
                name: 'Espresso',
                origin: 'Italy',
                strength: 'High',
                time: '30s',
                temp: '94°C',
                desc: 'The concentrated soul of coffee. A short, intense shot topped with a thick, golden layer of crema.',
                steps: [
                    { t: 'Grind', d: 'Ultra-fine grind, like powdered sugar.' },
                    { t: 'Tamp', d: 'Apply 30lbs of even pressure to the puck.' },
                    { t: 'Extract', d: 'Watch for the "mousetail" pour into the cup.' }
                ],
                img: 'https://images.unsplash.com/photo-1510707577719-aeef479f356d?auto=format&fit=crop&w=800&q=80'
            },
            cappuccino: {
                icon: '🥛',
                name: 'Cappuccino',
                origin: 'Italy',
                strength: 'Medium',
                time: '3m',
                temp: '65°C',
                desc: 'An equal balance of espresso, steamed milk, and airy foam. The classic morning indulgence.',
                steps: [
                    { t: 'Foam', d: 'Stretch the milk to double its volume.' },
                    { t: 'Combine', d: 'Pour the milk through the espresso center.' },
                    { t: 'Finish', d: 'Top with a peak of stiff microfoam.' }
                ],
                img: 'https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&w=800&q=80'
            },
            latte: {
                icon: '🍶',
                name: 'Café Latte',
                origin: 'Europe',
                strength: 'Mild',
                time: '4m',
                temp: '65°C',
                desc: 'Silky, smooth, and milky. Perfect for those who enjoy a longer, creamier coffee experience.',
                steps: [
                    { t: 'Steam', d: 'Create a wet, velvet texture with the milk.' },
                    { t: 'Pour', d: 'A steady pour creates the base for art.' },
                    { t: 'Art', d: 'Etch a heart or rosetta on the surface.' }
                ],
                img: 'https://images.unsplash.com/photo-1570968915860-54d5c301fa9f?auto=format&fit=crop&w=800&q=80'
            },
            mocha: {
                icon: '🍫',
                name: 'Mocha',
                origin: 'Yemen',
                strength: 'Medium',
                time: '5m',
                temp: '70°C',
                desc: 'The dessert of coffees. A rich blend of espresso, dark chocolate, and steamed milk.',
                steps: [
                    { t: 'Melt', d: 'Stir chocolate into the hot espresso shot.' },
                    { t: 'Layer', d: 'Add steamed milk gently to maintain richness.' },
                    { t: 'Indulge', d: 'Top with whipped cream and cocoa dust.' }
                ],
                img: 'https://images.unsplash.com/photo-1578314675249-a6910f80cc4e?auto=format&fit=crop&w=800&q=80'
            }
        };

        const nav = document.getElementById('coffeeNav');
        const display = document.getElementById('mainDisplay');

        function init() {
            Object.keys(coffeeMenu).forEach((key, index) => {
                const item = coffeeMenu[key];
                const card = document.createElement('div');
                card.className = `nav-card ${index === 0 ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="nav-icon">${item.icon}</div>
                    <div class="nav-name">${item.name}</div>
                    <div class="nav-origin">${item.origin}</div>
                `;
                card.onclick = () => updateDisplay(key, card);
                nav.appendChild(card);
            });
            updateDisplay('espresso');
        }

        function updateDisplay(key, cardElement) {
            // Update Active Nav
            if(cardElement) {
                document.querySelectorAll('.nav-card').forEach(c => c.classList.remove('active'));
                cardElement.classList.add('active');
            }

            const data = coffeeMenu[key];
            
            // Trigger transition
            display.classList.remove('active-view');
            
            setTimeout(() => {
                display.innerHTML = `
                    <div class="coffee-content">
                        <span class="title-tag">${data.origin} Origin</span>
                        <h2 class="main-title">${data.name}</h2>
                        <p class="desc">${data.desc}</p>
                        
                        <div class="stats-row">
                            <div class="stat-box">
                                <div class="stat-label">Intensity</div>
                                <div class="stat-data">${data.strength}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Brew Time</div>
                                <div class="stat-data">${data.time}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Temp</div>
                                <div class="stat-data">${data.temp}</div>
                            </div>
                        </div>

                        <div class="step-list">
                            ${data.steps.map((s, i) => `
                                <div class="step-item">
                                    <div class="step-num">${i+1}</div>
                                    <div class="step-text">
                                        <h4>${s.t}</h4>
                                        <p>${s.d}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="coffee-media">
                        <img src="${data.img}" class="hero-img" alt="${data.name}">
                        <div class="gallery">
                            <img src="${data.img}" class="thumb">
                            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=400&q=80" class="thumb">
                            <img src="https://images.unsplash.com/photo-1447933630913-bb796f2873fb?auto=format&fit=crop&w=400&q=80" class="thumb">
                        </div>
                    </div>
                `;
                display.classList.add('active-view');
            }, 100);
        }

        init();
    </script>
</body>
</html>
